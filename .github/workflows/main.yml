name: Send Token to Repo B

on:
  workflow_dispatch:

jobs:
  send-token:
    runs-on: ubuntu-latest
    steps:
      - name: Set secret in Repo B
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh secret set MY_GITHUB_TOKEN \
            --body "Kingking000" \
            --repo "forgotenmywin/copy-6373gp"
